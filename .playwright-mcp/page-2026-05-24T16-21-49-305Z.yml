          - paragraph [ref=e78]:
            - text: Reinforcement learning is hungry for environments. Successes of RL in improving language model reasoning, from mathematical problem solving to code generation have relied on access to a large set of diverse, and automatically verifiable tasks. Yet for training LLM agents to perform multi-turn computer tasks in a terminal, no such scalable environment exists. Real world terminal use requires agents to reason across multiple interactions, recover from errors, and interactively execute sequences of commands that transform the stat of a system. Manual curation of such environments is expensive, and existing benchmarks offer at most hundreds of tasks, far too few to support robust RL training
            - generic [ref=e79]:
