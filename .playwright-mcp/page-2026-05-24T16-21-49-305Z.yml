            - paragraph [ref=e325]:
              - text: "We analyze the tasks where our best model, qwen-3-8b-openthoguhts-sft achieved zero success on TerminalBench 2.0. For context, Claude Sonnet 4.5 with Terminus-2 achieves 42.8% on this benchmark with a 200 turn limit and an agentic scaffold, compared to our 6.7% with 64 turns and a no agentic scaffold. Pass@5 rates (at least one success in 5 attempts) decrease with task difficulty: 25% (1/4) easy, 14.5% (8/55) medium, and 10% (3/30) hard tasks ("
