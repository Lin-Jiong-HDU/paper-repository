            - text: "): 1) generating diverse task descriptions by sampling across categories, complexity levels, and scenario contexts; 2) building containerized environments and validating them with automatically generated prerequisite tests; 3) generating completion tests that verify the expected end state; and 4) filtering tasks by sampling solutions from a capable model to ensure solvability."
