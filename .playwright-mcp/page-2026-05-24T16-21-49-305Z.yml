              - link "2018" [ref=e89] [cursor=pointer]:
                - /url: https://arxiv.org/html/2601.16443v2#bib.bib15
              - text: )
            - text: "uses human curated datasets of coding or shell tasks, but the annotation cost limits scale and diversity. What remains missing is a fully autonomous pipeline that can generate an endless stream of terminal tasks: complete with initial environments, task specifications, and verification tests, with minimal human supervision."
          - paragraph [ref=e91]:
            - text: We introduce Endless Terminals, a procedural generation pipeline that synthesizes terminal-use tasks without human annotation or distillation. The pipeline operates in four stages (see
