              - text: ": the ratio of unique commands to total commands issued after the first error. Successful tasks exhibit significantly higher command diversity (0.49 on average) compared to failed tasks with loop behavior (0.18 on average), indicating that successful runs explore alternative approaches after errors while failed runs repeat commands."
