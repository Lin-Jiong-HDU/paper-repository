              - text: )
            - text: .
          - paragraph [ref=e84]:
            - text: Prior approaches to building capable terminal agents have largely sidestepped this environment bottleneck. Some rely on fixed evaluation benchmarks repurposed for training, risking overfitting to narrow task distributions. Others distill behavior from stronger proprietary models through supervised finetuning
            - generic [ref=e85]:
              - text: (Guha et al.,
              - link "2025" [ref=e86] [cursor=pointer]:
                - /url: https://arxiv.org/html/2601.16443v2#bib.bib2
              - text: )
            - text: ", inheriting the ceiling of the teacher and requiring expensive API access. A third line of work"
            - generic [ref=e87]:
