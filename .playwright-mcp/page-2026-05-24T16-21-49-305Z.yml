            - text: Interacting with the Terminal
          - generic [ref=e212]:
            - heading "Interaction Loop." [level=3] [ref=e213]
            - paragraph [ref=e215]: "At each turn, the model receives the conversation history, including its own previous reasoning and the shell outputs from prior commands, and produces either a command to execute or a signal that the task is complete. We use minimal XML tags to structure outputs: <command>...</command> wraps shell commands, and <command>done</command> indicates task completion. The model can include arbitrary reasoning before its command, which becomes part of the conversation history visible in subsequent turns. This means that the model can reference prior reasoning, correct mistakes, or build on partial progress."
          - generic [ref=e216]:
            - heading "Shell Environment." [level=3] [ref=e217]
            - paragraph [ref=e219]: "For the shell, we support two types of containers: Docker and Apptainer. For Docker, we use the harbor framework. For Apptainer, we maintain a persistent interactive shell session using a pseudo-terminal (PTY). The agent connects to an Apptainer container instance that remains alive across all turns of an episode, preserving filesystem state, environment variables, and running processes between commands. Each command executes in this persistent context. We capture both stdout and stderr, along with the exit code, and return a structured observation: whether the command succeeded or failed, followed by the output. This feedback is appended to the conversation as the next user message, and the loop continues."
          - generic [ref=e220]:
            - heading "Minimal Scaffolding." [level=3] [ref=e221]
            - paragraph [ref=e223]: "The system prompt contains only basic instructions: output one command per turn, use non-interactive flags, verify solutions before declaring completion. So, tools like vim, htop etc. cannot be used by the agent."
          - generic [ref=e224]:
            - heading "Episode Termination." [level=3] [ref=e225]
            - paragraph [ref=e227]: An episode ends when the agent emits the done action, reaches a maximum number of turns (16 while training) or tokens (16k while training). We execute the held-out final tests inside the container to determine success.
