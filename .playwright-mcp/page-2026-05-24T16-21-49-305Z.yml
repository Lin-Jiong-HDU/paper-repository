                - text: )
              - text: ", where the model becomes stuck repeating the same command sequence, accounting for 39% of failures (30 tasks), and 2) turn exhaustion, where the model hits the turn limit (we train with 16 turns and evaluate with 64 turns with a sliding window), affecting 26% of failures (20 tasks). These categories overlap, with 11 tasks exhibiting both behaviors. The remaining failures (49%) terminate early with incorrect solutions, often in specialized domains like cryptanalysis, machine learning model extraction, and bioinformatics where the model lacks domain knowledge. By category (pass@5), the model performs best on software-engineering (6/26), followed by data-science (1/8), optimization (1/2), scientific-computing (1/8), system-administration (1/9), data-processing (1/4), and security (1/8), while achieving zero success on mathematics (0/4), machine-learning (0/3), and model-training (0/4) tasks. To understand loop failures, we measure"
