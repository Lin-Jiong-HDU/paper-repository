            - text: ") for EndlessTerminals consists of four stages: 1) generating task descriptions, 2) setting up an environment while validating it with self-written tests, 3) generating tests to verify completion of a task, and 4) generating several solutions from a strong model to ensure the validity of a task. Each stage builds on the previous, with automatic verification ensuring validity at every step."
          - generic [ref=e167]:
            - heading "Generating Task Descriptions" [level=3] [ref=e168]
            - paragraph [ref=e170]:
              - text: We prompt (
              - link "Fig. 2" [ref=e171] [cursor=pointer]:
                - /url: https://arxiv.org/html/2601.16443v2#S1.F2
              - text: ", Phase I) a language model to generate task descriptions paired with privileged ground truth information. To ensure diversity, each prompt samples randomly from three dimensions: task categories (like file management, text processing, log analysis, git operations, database queries, security scanning, among others), complexity levels (from single commands to multi-step sequences), and scenario contexts (like developer organizing files, DevOps engineer debugging logs, data analyst processing CSVs). The model outputs a task instruction, written as a request someone might pose to an AI assistant, along with a separate privileged information section containing exact file contents, paths, and expected states that automated tests will use for verification. The privileged information section is never revealed to the agent interacting with the environment."
